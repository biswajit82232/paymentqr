<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Payment QR" />
  <title>Settings — Payment QR</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <div class="app-inner">
      <nav class="top-nav top-nav--settings" aria-label="Main">
        <a href="index.html" class="top-nav-link">← QR</a>
        <span class="top-nav-title">Settings</span>
        <span class="top-nav-spacer" aria-hidden="true"></span>
      </nav>

      <header class="hero hero--compact">
        <h1 class="hero-title">Shop settings</h1>
        <p class="hero-lede">Payee name and saved UPI IDs used when you create payment QR codes.</p>
      </header>

      <section class="panel" aria-labelledby="payee-heading">
        <div class="panel-head">
          <h2 id="payee-heading" class="panel-title">Payee display</h2>
          <p class="panel-desc">This name appears in the customer’s UPI app when they scan your QR.</p>
        </div>
        <label class="field">
          <span class="field-label">Name on payer’s screen</span>
          <input type="text" id="payeeName" class="input" maxlength="50" autocomplete="organization" />
        </label>
        <p class="feedback feedback--ok" id="payeeSaved" hidden>Saved</p>
      </section>

      <section class="panel" aria-labelledby="accounts-heading">
        <div class="panel-head">
          <h2 id="accounts-heading" class="panel-title">Saved UPI IDs</h2>
          <p class="panel-desc">One entry per bank or UPI ID. On the QR screen you choose which account receives the payment.</p>
        </div>
        <div class="accounts" id="accounts"></div>
        <div class="add-block">
          <div class="add-fields">
            <label class="sr-only" for="newLabel">Account label</label>
            <input type="text" id="newLabel" class="input" placeholder="Label (e.g. HDFC)" maxlength="40" />
            <label class="sr-only" for="newVpa">UPI ID</label>
            <input type="text" id="newVpa" class="input" placeholder="UPI ID (e.g. name@okhdfcbank)" maxlength="80" />
          </div>
          <button type="button" id="btnAdd" class="btn btn-outline btn-block">Add account</button>
        </div>
        <p class="feedback feedback--error" id="err" hidden role="alert"></p>
      </section>
    </div>
  </main>
  <script src="common.js"></script>
  <script src="settings.js"></script>
  <script src="pwa.js"></script>
</body>
</html>
